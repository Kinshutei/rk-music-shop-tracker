<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RK Music Shop Tracker</title>
  <meta property="og:title" content="RK Music Shop Tracker">
  <meta property="og:description" content="RK Music グッズの新着・販売終了・在庫変化をまとめて確認できるファン向けツールです。">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #1a1a24;
      border-bottom: 1px solid #2e2e3e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: #fff; }
    #last-updated { font-size: 0.78rem; color: #666; }

    /* ナビ（歌い手ジャンプ） */
    #singer-nav {
      background: #13131c;
      border-bottom: 1px solid #2e2e3e;
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      position: sticky;
      top: 53px;
      z-index: 99;
    }
    .nav-btn {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      color: #bbb;
      padding: 4px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.78rem;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #2e2e3e; color: #fff; }

    /* メインコンテンツ */
    .main { max-width: 1600px; margin: 0; padding: 24px 16px; }

    /* 変化セクション：パネル3列 */
    .changes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    @media (max-width: 800px) {
      .changes-grid { grid-template-columns: 1fr; }
    }

    .change-panel {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      overflow: hidden;
    }
    .change-panel-header {
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2e2e3e;
    }
    .change-panel-header.new  { border-left: 3px solid #4ade80; }
    .change-panel-header.gone { border-left: 3px solid #f87171; }
    .change-panel-header.avail{ border-left: 3px solid #facc15; }

    .badge {
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 999px;
      font-weight: 700;
    }
    .badge-new   { background: #1e4d2b; color: #4ade80; }
    .badge-gone  { background: #4d1e1e; color: #f87171; }
    .badge-avail { background: #2d2d1e; color: #facc15; }

    /* 変化パネル内：3列カードグリッド */
    .change-panel-body { padding: 12px; }
    .change-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 600px) {
      .change-cards { grid-template-columns: repeat(2, 1fr); }
    }

    .change-card {
      background: #13131c;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .change-card:hover { border-color: #5555aa; }
    .change-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #2e2e3e;
      display: block;
    }
    .change-card .cc-body {
      padding: 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .change-card .cc-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: #ddd;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .change-card .cc-title a {
      color: inherit;
      text-decoration: none;
    }
    .change-card .cc-title a:hover { text-decoration: underline; color: #c0c0ff; }
    .change-card .cc-sub { font-size: 0.65rem; color: #666; }
    .no-change { color: #444; font-size: 0.82rem; padding: 4px 0; }

    /* 歌い手セクション */
    .singer-section { margin-bottom: 48px; }
    .singer-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #2e2e3e;
    }
    .singer-name { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .singer-count { font-size: 0.75rem; color: #666; }

    /* 商品リスト：3列グリッド */
    .product-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 900px) {
      .product-list { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .product-list { grid-template-columns: 1fr; }
    }

    .product-card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      transition: border-color 0.15s;
      text-decoration: none;
      cursor: pointer;
    }
    .product-card:hover { border-color: #5555aa; }

    .product-card .thumb {
      width: 96px;
      flex-shrink: 0;
    }
    .product-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #2e2e3e;
    }
    .product-card .thumb.no-img { background: #1e1e2e; }

    .card-body {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      gap: 6px;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* バリアントグリッド：左=商品名、右=サイズドット、行ごとに揃える */
    .variant-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 3px 10px;
      align-items: center;
      justify-content: start;
    }
    .group-name {
      font-size: 0.72rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .group-chips {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .stock-chip {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.68rem;
      color: #888;
      white-space: nowrap;
    }
    .stock-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stock-dot.on  { background: #4ade80; }
    .stock-dot.off { background: #f87171; }

    footer {
      text-align: center;
      padding: 32px;
      color: #444;
      font-size: 0.75rem;
      border-top: 1px solid #1e1e2e;
      margin-top: 16px;
    }
    footer a { color: #7878cc; }
  </style>
</head>
<body>

<header>
  <h1>RK Music Shop Tracker</h1>
  <span id="last-updated">読み込み中...</span>
</header>

<nav id="singer-nav"></nav>

<div class="main">

  <!-- 変化パネル3列 -->
  <div class="changes-grid">
    <div class="change-panel">
      <div class="change-panel-header new">
        🆕 新着商品 <span class="badge badge-new" id="badge-new">0</span>
      </div>
      <div class="change-panel-body"><div class="change-cards" id="new-list"></div></div>
    </div>
    <div class="change-panel">
      <div class="change-panel-header gone">
        🚫 販売終了・削除 <span class="badge badge-gone" id="badge-gone">0</span>
      </div>
      <div class="change-panel-body"><div class="change-cards" id="gone-list"></div></div>
    </div>
    <div class="change-panel">
      <div class="change-panel-header avail">
        🔄 在庫変化 <span class="badge badge-avail" id="badge-avail">0</span>
      </div>
      <div class="change-panel-body"><div class="change-cards" id="avail-list"></div></div>
    </div>
  </div>

  <!-- 歌い手別セクション -->
  <div id="singers-container"></div>

</div>

<footer>
  このサイトはファンが個人的に作成したものです。
  公式ショップは <a href="https://shop.reality-studios.inc/pages/rk-music" target="_blank" rel="noopener">こちら</a>
</footer>

<script>
  const DATA_URL = "data/data.json";

  const EXCLUDED_TAGS = new Set([
    "RK Music","KMNLABEL","Fused",
    "NEW","受注生産商品","在庫限り","在庫限り商品","販売終了商品","ライブグッズ","ぬいぐるみ","ミニぬい",
    "Bundle","セット","ノベルティ",
  ]);

  const UNIT_MEMBERS = {
    "KMNZ":         ["LITA", "TINA", "NERO"],
    "VESPERBELL":   ["カスカ", "ヨミ"],
    "HONK THE HORN":["BAMBI", "MOCO"],
    "LIVE UNION":   ["HACHI", "焔魔るり", "瀬戸乃とと", "水瀬凪"],
  };
  const UNITS = new Set(Object.keys(UNIT_MEMBERS));
  const JOINT = "合同";

  function categorizeProduct(tags) {
    const singerTags = tags.filter(t => !EXCLUDED_TAGS.has(t));
    const singerSet  = new Set(singerTags);

    // ユニット判定：メンバーが2名以上いる、またはユニット名のみ（メンバー名なし）
    const matchedUnits = [];
    for (const [unitName, members] of Object.entries(UNIT_MEMBERS)) {
      const membersPresent = members.filter(m => singerSet.has(m));
      if (membersPresent.length >= 2) {
        matchedUnits.push(unitName);
      } else if (singerSet.has(unitName) && membersPresent.length === 0) {
        matchedUnits.push(unitName);
      }
    }

    if (matchedUnits.length > 1) return JOINT;
    if (matchedUnits.length === 1) return matchedUnits[0];

    // ユニット名を除いた個人タグで判定
    const individualTags = singerTags.filter(t => !UNITS.has(t));
    if (individualTags.length > 1) return JOINT;
    if (individualTags.length === 1) return individualTags[0];

    return null;
  }

  async function load() {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" });
  }

  /* 変化パネル内カード */
  function changeCardHTML(p, note) {
    return `
      <div class="change-card">
        ${p.thumbnail ? `<img src="${p.thumbnail}" alt="" loading="lazy">` : ""}
        <div class="cc-body">
          <div class="cc-title"><a href="${p.url}" target="_blank" rel="noopener">${p.title}</a></div>
          <div class="cc-sub">${(p.singers ?? []).join(" / ") || "—"}${note ? "<br>" + note : ""}</div>
        </div>
      </div>`;
  }

  function renderChanges(ch) {
    document.getElementById("badge-new").textContent   = ch.new_products.length;
    document.getElementById("badge-gone").textContent  = ch.removed_products.length;
    document.getElementById("badge-avail").textContent = ch.availability_changes.length;

    document.getElementById("new-list").innerHTML =
      ch.new_products.length
        ? ch.new_products.map(p => changeCardHTML(p, "")).join("")
        : `<p class="no-change">変化なし</p>`;

    document.getElementById("gone-list").innerHTML =
      ch.removed_products.length
        ? ch.removed_products.map(p => changeCardHTML(p, "")).join("")
        : `<p class="no-change">変化なし</p>`;

    document.getElementById("avail-list").innerHTML =
      ch.availability_changes.length
        ? ch.availability_changes.map(c =>
            changeCardHTML(
              { title: c.product_title, singers: c.singers, thumbnail: null, url: "#" },
              `${c.variant}: ${c.before ? "在庫あり" : "売り切れ"} → ${c.after ? "在庫あり" : "売り切れ"}`
            )).join("")
        : `<p class="no-change">変化なし</p>`;
  }

  /* サイズ suffix を末尾から検出して除去 */
  const SIZE_RE = /[\s　]*(（(?:XXL|XL|L|M|S)サイズ）|(?:XXL|XL|L|M|S)サイズ)$/;

  function normalizeSize(s) {
    return s.replace(/[（(）)サイズ\s　]/g, "");
  }

  function groupVariants(variants) {
    const groups = new Map();
    variants.forEach(v => {
      const m = v.title.match(SIZE_RE);
      const base = m ? v.title.slice(0, v.title.length - m[0].length).trim() : v.title;
      const size = m ? normalizeSize(m[1]) : null;
      if (!groups.has(base)) groups.set(base, []);
      groups.get(base).push({ size, available: v.available });
    });
    return groups;
  }

  /* 歌い手別横長カード */
  function productCardHTML(p) {
    const groups = groupVariants(p.variants);

    const rowsHTML = [...groups.entries()].map(([base, items]) => {
      const isDefault = base === "Default Title";
      const chips = items.map(item => `
        <span class="stock-chip">
          <span class="stock-dot ${item.available ? "on" : "off"}"></span>
          <span>${item.size ?? (isDefault ? "在庫" : "")}</span>
        </span>`).join("");

      return `
        <span class="group-name" title="${base}">${isDefault ? "" : base}</span>
        <span class="group-chips">${chips}</span>`;
    }).join("");

    return `
      <a class="product-card" href="${p.url}" target="_blank" rel="noopener">
        <div class="thumb ${p.thumbnail ? "" : "no-img"}">
          ${p.thumbnail ? `<img src="${p.thumbnail}" alt="${p.title}" loading="lazy">` : ""}
        </div>
        <div class="card-body">
          <div class="card-title" title="${p.title}">${p.title}</div>
          <div class="variant-grid">${rowsHTML}</div>
        </div>
      </a>`;
  }

  /* 歌い手別セクション */
  function renderSingers(products) {
    const jointMap = new Map();   // 合同：商品ごとに1エントリ
    const unitMap  = new Map();
    const indivMap = new Map();

    products.forEach(p => {
      const cat = categorizeProduct(p.tags);
      if (!cat) return;
      if (cat === JOINT) {
        if (!jointMap.has(cat)) jointMap.set(cat, []);
        jointMap.get(cat).push(p);
      } else if (UNITS.has(cat)) {
        if (!unitMap.has(cat)) unitMap.set(cat, []);
        unitMap.get(cat).push(p);
      } else {
        if (!indivMap.has(cat)) indivMap.set(cat, []);
        indivMap.get(cat).push(p);
      }
    });

    const sortJa = map => [...map.entries()].sort((a, b) => a[0].localeCompare(b[0], "ja"));

    const sections = [
      ...(jointMap.size ? [[JOINT, jointMap.get(JOINT)]] : []),
      ...sortJa(unitMap),
      ...sortJa(indivMap),
    ];

    document.getElementById("singer-nav").innerHTML = sections.map(([name]) =>
      `<a class="nav-btn" href="#singer-${encodeURIComponent(name)}">${name}</a>`
    ).join("");

    document.getElementById("singers-container").innerHTML = sections.map(([name, prods]) => `
      <section class="singer-section" id="singer-${encodeURIComponent(name)}">
        <div class="singer-header">
          <span class="singer-name">${name}</span>
          <span class="singer-count">${prods.length} 件</span>
        </div>
        <div class="product-list">
          ${prods.map(productCardHTML).join("")}
        </div>
      </section>`
    ).join("");
  }

  load().then(data => {
    document.getElementById("last-updated").textContent = "最終更新: " + fmtDate(data.scraped_at);
    renderChanges(data.latest_changes);
    renderSingers(data.products);
  }).catch(err => {
    document.getElementById("last-updated").textContent = "データ取得失敗";
    console.error(err);
  });
</script>
</body>
</html>
